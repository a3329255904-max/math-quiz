<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高等数学选择题测验</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
    min-height: 100vh;
    font-family: -apple-system, "Microsoft YaHei", sans-serif;
    color: #e0e0e0;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 30px 16px 80px;
  }

  .container {
    max-width: 720px;
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 32px 28px;
    backdrop-filter: blur(6px);
  }

  h1 {
    text-align: center;
    font-size: 26px;
    font-weight: 700;
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }
  .subtitle {
    text-align: center;
    font-size: 14px;
    color: #888;
    margin-bottom: 32px;
  }

  /* 进度条 */
  .progress {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 28px;
  }
  .progress-bar {
    flex: 1;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-inner {
    height: 100%;
    background: linear-gradient(90deg, #a78bfa, #f472b6);
    border-radius: 3px;
    transition: width 0.35s ease;
  }
  .progress-text {
    font-size: 13px;
    color: #999;
    white-space: nowrap;
  }

  /* 题目卡片 */
  .question-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 20px;
    transition: border-color 0.2s;
  }
  .question-card.answered {
    border-color: rgba(167,139,250,0.3);
  }
  .question-card.correct {
    border-color: rgba(52,211,153,0.4);
    background: rgba(52,211,153,0.06);
  }
  .question-card.wrong {
    border-color: rgba(248,113,113,0.4);
    background: rgba(248,113,113,0.06);
  }

  .q-num {
    display: inline-block;
    font-size: 12px;
    font-weight: 600;
    color: #a78bfa;
    background: rgba(167,139,250,0.12);
    padding: 3px 10px;
    border-radius: 20px;
    margin-bottom: 12px;
  }
  .q-text {
    font-size: 16px;
    line-height: 1.7;
    margin-bottom: 18px;
    color: #ddd;
  }

  /* 选项 */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
    font-size: 15px;
    color: #ccc;
  }
  .option:hover {
    background: rgba(167,139,250,0.08);
    border-color: rgba(167,139,250,0.25);
  }
  .option.selected {
    background: rgba(167,139,250,0.15);
    border-color: #a78bfa;
    color: #fff;
  }
  .option.correct-answer {
    background: rgba(52,211,153,0.15);
    border-color: #34d399;
    color: #34d399;
  }
  .option.wrong-answer {
    background: rgba(248,113,113,0.15);
    border-color: #f87171;
    color: #f87171;
  }

  .option-radio {
    width: 20px; height: 20px;
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }
  .selected .option-radio {
    border-color: #a78bfa;
    background: #a78bfa;
  }
  .selected .option-radio::after {
    content: '';
    width: 6px; height: 6px;
    background: #fff;
    border-radius: 50%;
  }
  .correct-answer .option-radio {
    border-color: #34d399;
    background: #34d399;
  }
  .wrong-answer .option-radio {
    border-color: #f87171;
    background: #f87171;
  }

  /* 按钮 */
  .actions {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 32px;
  }
  .btn {
    padding: 13px 36px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.25s;
    font-family: inherit;
  }
  .btn-primary {
    background: linear-gradient(135deg, #a78bfa, #f472b6);
    color: #fff;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(167,139,250,0.3); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-secondary {
    background: rgba(255,255,255,0.06);
    color: #aaa;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.1); color: #ddd; }
  .btn-accent {
    background: rgba(167,139,250,0.12);
    color: #c4b5fd;
    border: 1px solid rgba(167,139,250,0.2);
  }
  .btn-accent:hover { background: rgba(167,139,250,0.2); color: #ddd; }

  /* 水印 — 紧随标题 */
  .watermark {
    display: inline;
    font-size: 13px;
    color: rgba(255,255,255,0.12);
    font-weight: 400;
    letter-spacing: 2px;
    margin-left: 10px;
    pointer-events: none;
    user-select: none;
    vertical-align: middle;
  }

  /* 结果面板 */
  .result-panel {
    display: none;
    text-align: center;
    padding: 36px 24px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    margin-top: 20px;
    animation: fadeIn 0.4s ease;
  }
  .result-panel.show { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .score-circle {
    width: 140px; height: 140px;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin: 0 auto 20px;
    border: 4px solid;
  }
  .score-num {
    font-size: 48px;
    font-weight: 800;
    line-height: 1;
  }
  .score-label {
    font-size: 13px;
    color: #999;
    margin-top: 4px;
  }
  .result-msg {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .result-detail {
    font-size: 14px;
    color: #999;
    line-height: 1.6;
  }

  /* 响应式 */
  @media (max-width: 480px) {
    .container { padding: 20px 14px; }
    h1 { font-size: 22px; }
    .q-text { font-size: 15px; }
    .option { padding: 11px 13px; font-size: 14px; }
  }
</style>
</head>
<body>

<div class="container">
  <h1>高等数学 · 选择题测验<span class="watermark">谭生城</span></h1>
  <p class="subtitle">共 10 题，每题 10 分，满分 100 分</p>

  <!-- 进度条 -->
  <div class="progress">
    <div class="progress-bar">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
    <span class="progress-text" id="progressLabel">已答 0/10</span>
  </div>

  <!-- 题目列表 -->
  <div id="questionsContainer"></div>

  <!-- 操作按钮 -->
  <div class="actions">
    <button class="btn btn-accent" onclick="refreshQuestions()">换一批题目</button>
    <button class="btn btn-primary" id="submitBtn" disabled onclick="submitQuiz()">提交答卷</button>
    <button class="btn btn-secondary" onclick="resetQuiz()">重新作答</button>
  </div>

  <!-- 结果面板 -->
  <div class="result-panel" id="resultPanel">
    <div class="score-circle" id="scoreCircle">
      <span class="score-num" id="scoreNum">0</span>
      <span class="score-label">分</span>
    </div>
    <div class="result-msg" id="resultMsg"></div>
    <div class="result-detail" id="resultDetail"></div>
    <div style="margin-top:20px">
      <button class="btn btn-secondary" onclick="resetQuiz()">再来一次</button>
    </div>
  </div>
</div>

<script>
// ============================================================
//  题库：30 道高等数学选择题（每次随机抽 10 题不重复）
//  答案字段 answer 对应选项索引 0=A, 1=B, 2=C, 3=D
// ============================================================
const FULL_BANK = [
  {
    id: 1,
    text: '极限 lim(x→0) sin(3x) / x 的值为？',
    options: ['0', '1', '3', '不存在'],
    answer: 2
  },
  {
    id: 2,
    text: '函数 f(x) = |x| 在 x = 0 处的可导性如何？',
    options: ['可导，导数为 0', '可导，导数为 1', '不可导，左右导数不相等', '不可导，函数不连续'],
    answer: 2
  },
  {
    id: 3,
    text: '定积分 ∫[0,1] x·e^x dx 的值为？',
    options: ['e - 1', '1', 'e', 'e - 2'],
    answer: 1
  },
  {
    id: 4,
    text: '微分方程 dy/dx = -2y 满足 y(0)=5 的特解是？',
    options: ['y = 5e^(2x)', 'y = 5e^(-2x)', 'y = -2x + 5', 'y = 5x^(-2)'],
    answer: 1
  },
  {
    id: 5,
    text: '级数 Σ[n=1,∞] 1/n² 的敛散性为？',
    options: ['发散', '条件收敛', '绝对收敛', '无法判断'],
    answer: 2
  },
  {
    id: 6,
    text: '二元函数 f(x,y) = x² + y² 在点 (0,0) 处取得？',
    options: ['极大值', '极小值', '鞍点', '非驻点'],
    answer: 1
  },
  {
    id: 7,
    text: '二阶行列式 |1,2; 3,4| 的值为？',
    options: ['-2', '2', '10', '-10'],
    answer: 0
  },
  {
    id: 8,
    text: '曲面 x²+y²+z²=4 上点 (1,1,√2) 处的法向量方向为？',
    options: ['(1,1,√2)', '(1,1,0)', '(2,2,2√2)', '(0,0,1)'],
    answer: 2
  },
  {
    id: 9,
    text: '曲线 y = x³ - 3x 的拐点坐标为？',
    options: ['(1,-2)', '(-1,2)', '(0,0)', '以上都是'],
    answer: 2
  },
  {
    id: 10,
    text: '设 X~N(0,1)，则 P(|X|<1.96) 约等于？',
    options: ['0.68', '0.90', '0.95', '0.99'],
    answer: 2
  },
  // ---- 补充题库 ----
  {
    id: 11,
    text: '极限 lim(x→∞) (1 + 1/x)^x 的值为？',
    options: ['0', '1', 'e', '∞'],
    answer: 2
  },
  {
    id: 12,
    text: '函数 y = ln(1+x) 在 x=0 处的一阶泰勒展开为？',
    options: ['x - x²/2', 'x', '1 + x', '1 - x'],
    answer: 1
  },
  {
    id: 13,
    text: '曲线 y = sin(x) 在 x=0 处的切线斜率为？',
    options: ['0', '1', '-1', '不存在'],
    answer: 1
  },
  {
    id: 14,
    text: '不定积分 ∫ 1/(1+x²) dx = ？',
    options: ['ln(1+x²) + C', 'arctan(x) + C', 'arcsin(x) + C', 'tan(x) + C'],
    answer: 1
  },
  {
    id: 15,
    text: '二重积分 ∬[D] dxdy 当 D 为单位圆时的值为？',
    options: ['π/2', 'π', '2π', 'π/4'],
    answer: 1
  },
  {
    id: 16,
    text: '微分方程 y\'\' + y = 0 的通解为？',
    options: ['y = C₁e^x + C₂e^(-x)', 'y = C₁cos(x) + C₂sin(x)', 'y = C₁x + C₂', 'y = e^x(C₁cos x + C₂sin x)'],
    answer: 1
  },
  {
    id: 17,
    text: '矩阵 [1,2; 2,1] 的特征值为？',
    options: ['1, 1', '3, -1', '2, 0', '1, -1'],
    answer: 1
  },
  {
    id: 18,
    text: '幂级数 Σ[n=0,∞] x^n 的收敛半径为？',
    options: ['0', '1', '∞', 'e'],
    answer: 1
  },
  {
    id: 19,
    text: '函数 f(x) = x·sin(1/x) 在 x→0 时的极限为？',
    options: ['0', '1', '不存在', '∞'],
    answer: 0
  },
  {
    id: 20,
    text: '向量 a=(1,2,3) 与 b=(4,5,6) 的点积为？',
    options: ['14', '32', '20', '56'],
    answer: 1
  },
  {
    id: 21,
    text: '曲线积分中，若 ∂P/∂y = ∂Q/∂x，则积分与路径？',
    options: ['无关', '有关', '恒为零', '恒发散'],
    answer: 0
  },
  {
    id: 22,
    text: '拉普拉斯变换 L{1} = ？',
    options: ['1/s²', '1/s', 's', 'e^(-s)'],
    answer: 1
  },
  {
    id: 23,
    text: '函数 f(x) = x³ - 3x 在区间 [-1,1] 上的最大值为？',
    options: ['0', '2', '-2', '1'],
    answer: 1
  },
  {
    id: 24,
    text: '偏导数 ∂/∂x (x²y + xy²) = ？',
    options: ['x² + 2xy', '2xy + y²', '2x + y²', 'x² + y²'],
    answer: 1
  },
  {
    id: 25,
    text: '一阶线性微分方程 y\' + P(x)y = Q(x) 的通解中使用的方法是？',
    options: ['分离变量法', '常数变易法', '特征根法', '拉普拉斯变换'],
    answer: 1
  },
  {
    id: 26,
    text: '极限 lim(n→∞) (n/(n+1))^n 的值为？',
    options: ['0', '1/e', '1', 'e'],
    answer: 1
  },
  {
    id: 27,
    text: '函数 f(x) = x²·e^(-x) 的驻点为？',
    options: ['x=0', 'x=2', 'x=0 和 x=2', '无极值点'],
    answer: 2
  },
  {
    id: 28,
    text: '设 A 为 3 阶方阵且 |A|=2，则 |2A| = ？',
    options: ['4', '8', '16', '2'],
    answer: 2
  },
  {
    id: 29,
    text: 'Γ(1/2) 的值为？',
    options: ['1/2', '√π', 'π', '2'],
    answer: 1
  },
  {
    id: 30,
    text: '曲线 y = ln(x) 在 x=1 处的曲率半径为？',
    options: ['1', '√2', '2√2', '2'],
    answer: 2
  }
];

// ============================================================
//  状态管理
// ============================================================
const QUIZ_SIZE = 10;
let questions = [];                         // 当前抽取的 10 题
let userAnswers = new Array(QUIZ_SIZE);    // -1 = 未作答
let submitted = false;

// ============================================================
//  随机抽题（Fisher-Yates 洗牌，取前 QUIZ_SIZE 题）
// ============================================================
function shuffleAndPick() {
  const pool = FULL_BANK.slice();                // 浅拷贝题库
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  return pool.slice(0, QUIZ_SIZE);
}

function refreshQuestions() {
  questions = shuffleAndPick();
  userAnswers = new Array(QUIZ_SIZE).fill(-1);
  submitted = false;
  resultPanel.classList.remove('show');
  submitBtn.disabled = true;
  renderQuestions();
  document.getElementById('progressBar').style.width = '0%';
  document.getElementById('progressLabel').textContent = '已答 0/' + QUIZ_SIZE;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ============================================================
//  渲染题目列表
// ============================================================
const container   = document.getElementById('questionsContainer');
const submitBtn   = document.getElementById('submitBtn');
const resultPanel = document.getElementById('resultPanel');

function renderQuestions() {
  container.innerHTML = questions.map((q, idx) => {
    const userAns = userAnswers[idx];
    const showResult = submitted;
    const isCorrect = userAns === q.answer;
    const cardClass = showResult
      ? (isCorrect ? 'correct' : (userAns >= 0 ? 'wrong' : ''))
      : (userAns >= 0 ? 'answered' : '');

    return `
      <div class="question-card ${cardClass}" id="card-${idx}">
        <span class="q-num">第 ${idx + 1} 题 · 10 分</span>
        <div class="q-text">${idx + 1}. ${q.text}</div>
        <div class="options">
          ${q.options.map((opt, oi) => {
            let optClass = '';
            if (showResult) {
              if (oi === q.answer) optClass = 'correct-answer';
              else if (oi === userAns && oi !== q.answer) optClass = 'wrong-answer';
            } else {
              if (oi === userAns) optClass = 'selected';
            }
            return `
              <div class="option ${optClass}"
                   onclick="${showResult ? '' : `selectAnswer(${idx}, ${oi})`}"
                   style="${showResult ? 'cursor:default' : ''}">
                <div class="option-radio"></div>
                <span>${'ABCD'[oi]}. ${opt}</span>
                ${showResult && oi === q.answer ? '<span style="margin-left:auto;color:#34d399;font-size:12px">✓ 正确答案</span>' : ''}
                ${showResult && oi === userAns && oi !== q.answer ? '<span style="margin-left:auto;color:#f87171;font-size:12px">✗ 你的答案</span>' : ''}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `;
  }).join('');

  updateProgress();
}

function selectAnswer(idx, optionIdx) {
  if (submitted) return;
  userAnswers[idx] = optionIdx;
  renderQuestions();
  updateSubmitButton();
}

function updateSubmitButton() {
  const allAnswered = userAnswers.every(a => a >= 0);
  submitBtn.disabled = !allAnswered;
}

function updateProgress() {
  const answered = userAnswers.filter(a => a >= 0).length;
  const pct = Math.round(answered / questions.length * 100);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `已答 ${answered}/${questions.length}`;
}

// ============================================================
//  提交 & 判分
// ============================================================
function submitQuiz() {
  const allAnswered = userAnswers.every(a => a >= 0);
  if (!allAnswered) return;

  submitted = true;
  renderQuestions();
  submitBtn.disabled = true;

  // 计算分数
  let correctCount = 0;
  const details = [];
  questions.forEach((q, idx) => {
    const isCorrect = userAnswers[idx] === q.answer;
    if (isCorrect) correctCount++;
    details.push({
      id: q.id,
      correct: isCorrect,
      yourAnswer: 'ABCD'[userAnswers[idx]],
      correctAnswer: 'ABCD'[q.answer]
    });
  });

  const score = correctCount * 10;

  // 显示结果
  const wrongList = details.filter(d => !d.correct);

  document.getElementById('scoreNum').textContent = score;
  document.getElementById('resultDetail').innerHTML = wrongList.length > 0
    ? `答错 <b>${wrongList.length}</b> 题：${wrongList.map(d => '第' + d.id + '题（你选' + d.yourAnswer + '，正确' + d.correctAnswer + '）').join('、')}`
    : '全部正确，太强了！';

  // 根据分数显示不同信息
  let msg, color;
  if (score === 100) {
    msg = '满分！高等数学扎实！';
    color = '#34d399';
  } else if (score >= 80) {
    msg = '表现优秀，继续保持！';
    color = '#60a5fa';
  } else if (score >= 60) {
    msg = '及格，还有提升空间。';
    color = '#fbbf24';
  } else {
    msg = '需要加强复习哦，加油！';
    color = '#f87171';
  }
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultMsg').style.color = color;

  const circle = document.getElementById('scoreCircle');
  circle.style.borderColor = color;
  circle.querySelector('.score-num').style.color = color;

  resultPanel.classList.add('show');
  resultPanel.scrollIntoView({ behavior: 'smooth', block: 'center' });

  // 滚动到错题
  if (wrongList.length > 0) {
    const firstWrong = details.findIndex(d => !d.correct);
    setTimeout(() => {
      document.getElementById('card-' + firstWrong)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 300);
  }
}

// ============================================================
//  重置
// ============================================================
function resetQuiz() {
  userAnswers = new Array(QUIZ_SIZE).fill(-1);
  submitted = false;
  resultPanel.classList.remove('show');
  renderQuestions();
  updateSubmitButton();
  submitBtn.disabled = true;
}

// ============================================================
//  初始化
// ============================================================
questions = shuffleAndPick();
userAnswers = new Array(QUIZ_SIZE).fill(-1);
renderQuestions();
</script>
</body>
</html>
